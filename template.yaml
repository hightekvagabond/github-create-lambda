AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GitHub Repo Creator Lambda — creates repos only, no destructive operations.

Globals:
  Function:
    Timeout: 15
    Runtime: nodejs20.x

Resources:
  GitHubCreateApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        ApiKeyRequired: true

  GitHubCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: .
      MemorySize: 128
      Architectures:
        - arm64
      Environment:
        Variables:
          PLACEHOLDER: "Add TOKEN_* env vars after deployment"
      Events:
        ListTokens:
          Type: Api
          Properties:
            RestApiId: !Ref GitHubCreateApi
            Path: /tokens
            Method: get
        CreateRepo:
          Type: Api
          Properties:
            RestApiId: !Ref GitHubCreateApi
            Path: /create
            Method: post
        CreateRepoRoot:
          Type: Api
          Properties:
            RestApiId: !Ref GitHubCreateApi
            Path: /
            Method: post

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn:
      - GitHubCreateApiProdStage
    Properties:
      Name: github-create-lambda-key
      Enabled: true
      StageKeys:
        - RestApiId: !Ref GitHubCreateApi
          StageName: Prod

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - GitHubCreateApiProdStage
    Properties:
      UsagePlanName: github-create-lambda-plan
      ApiStages:
        - ApiId: !Ref GitHubCreateApi
          Stage: Prod
      Throttle:
        RateLimit: 10
        BurstLimit: 20

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${GitHubCreateApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt GitHubCreateFunction.Arn
  ApiKeyId:
    Description: API Key ID (retrieve value from AWS Console or CLI)
    Value: !Ref ApiKey
